name: CI

on:
  push:
    branches:
      - main
      #- dev
    paths-ignore:
      - "docs/**"
      - "website/**"
      - "images/**"
      - "**.md"
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "docs/**"
      - "website/**"
      - "images/**"
      - "**.md"
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version
        type: choice
        options: ["3.12", "3.11", "3.13"]
        default: "3.12"
      node-version:
        description: Node.js version
        type: choice
        options: ["20", "22"]
        default: "20"

jobs:
  unit-tests:
    name: Unit Tests
    if: ${{ github.event.pull_request.draft == false || github.event_name != 'pull_request' }}
    uses: ./.github/workflows/unit-tests.yml
    permissions:
      checks: write
      contents: read
      pull-requests: write
    with:
      python-version: ${{ inputs.python-version || '3.12' }}

  frontend-tests:
    name: Frontend Tests
    if: ${{ github.event.pull_request.draft == false || github.event_name != 'pull_request' }}
    uses: ./.github/workflows/frontend-tests.yml
    permissions:
      checks: write
      contents: read
      pull-requests: write
    with:
      node-version: ${{ inputs.node-version || '20' }}

  integration-tests:
    name: Integration Tests
    if: ${{ github.event.pull_request.draft == false || github.event_name != 'pull_request' }}
    uses: ./.github/workflows/api-tests.yml
    permissions:
      checks: write
      contents: read
      pull-requests: write
    with:
      python-version: ${{ inputs.python-version || '3.12' }}
      node-version: ${{ inputs.node-version || '20' }}

  docker-build:
    name: Docker Build
    if: ${{ github.event.pull_request.draft == false || github.event_name != 'pull_request' }}
    uses: ./.github/workflows/docker-build.yml
