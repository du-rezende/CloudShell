name: Frontend Tests (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        type: string
        default: "20"
    secrets:
      GH_PAT:
        description: Personal access token for publishing test results
        required: false

# make sure any default token reference uses the GH_PAT env
env:
  GITHUB_TOKEN: ${{ secrets.GH_PAT }}
  GH_PAT: ${{ secrets.GH_PAT }}

jobs:
  frontend-tests:
    name: Frontend unit tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --silent

      - name: Create reports directory
        working-directory: frontend
        run: mkdir -p reports

      - name: Run Vitest with coverage
        working-directory: frontend
        run: npm run test:coverage 2>&1 | tee coverage-output.txt

      - name: Write coverage summary to job summary
        if: always()
        working-directory: frontend
        run: |
          echo "## Frontend Test Coverage (Node ${{ inputs.node-version }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage-output.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat coverage-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No coverage data available." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload JUnit test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-junit-results-node${{ inputs.node-version }}
          path: frontend/reports/junit.xml
          retention-days: 30

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-node${{ inputs.node-version }}
          path: frontend/coverage/
          retention-days: 14

      - name: Publish test results check (PR only)
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: ${{ env.GH_PAT != '' && github.event_name == 'pull_request' }}
        with:
          files: frontend/reports/junit.xml
          check_name: "Frontend Test Results (Node ${{ inputs.node-version }})"
          comment_mode: always
          report_individual_runs: true
          github_token: ${{ secrets.GH_PAT }}
